<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Principal 2.2 - Sistema Corporativo</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/css/forms.css">
  <link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body data-module="principal_2_2">
  <div class="layout">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-badge">PC</div>
          <div>
            <div>Sistema Corporativo</div>
            <small>Principal 2 / Principal 2.2</small>
          </div>
        </div>
        <div class="topbar-actions">
          <span id="topbarUser">Usuario</span>
          <button class="btn btn-danger" id="btnLogout" type="button">Salir</button>
        </div>
      </div>
    </header>

    <div class="green-line"></div>

    <main class="main-shell">
      <aside class="sidebar">
        <div class="menu-title">Menú principal</div>
        <div id="sidebarMenu"></div>
      </aside>

      <section class="content">
        <nav class="breadcrumb">
          <a href="/dashboard">Inicio</a>
          <span>/</span>
          <span>Principal 2</span>
          <span>/</span>
          <span class="current">Principal 2.2</span>
        </nav>

        <div class="card">
          <h1 class="page-title">Principal 2.2</h1>
          <p class="page-subtitle">Pantalla estática final del menú principal 2.</p>
        </div>

        <div class="card">
          <div class="toolbar">
            <button type="button" class="btn btn-success">Nuevo</button>
            <button type="button" class="btn btn-info">Consultar</button>
            <button type="button" class="btn btn-warning">Editar</button>
            <button type="button" class="btn btn-danger">Eliminar</button>
          </div>

          <form class="form-grid">
            <div class="form-group">
              <label>Nombre</label>
              <input type="text" placeholder="Nombre">
            </div>

            <div class="form-group">
              <label>Correo</label>
              <input type="email" placeholder="correo@ejemplo.com">
            </div>

            <div class="form-group">
              <label>Fecha</label>
              <input type="date">
            </div>

            <div class="form-group">
              <label>Estado</label>
              <select>
                <option>Seleccione</option>
                <option>Activo</option>
                <option>Inactivo</option>
              </select>
            </div>

            <div class="form-actions">
              <button type="button" class="btn btn-success">Guardar</button>
              <button type="button" class="btn btn-secondary">Cancelar</button>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/menu.js"></script>
  <script src="/static/js/principal.js"></script>
</body>
</html>
