<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistema Corporativo</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="/static/css/login.css">
  <link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo-block">
          <div class="login-logo-circle">PC</div>
          <div>
            <h1 class="login-title">Bienvenido</h1>
            <p class="login-subtitle">Sistema Corporativo - Desarrollo Web Profesional</p>
          </div>
        </div>
      </div>

      <div class="green-line login-line"></div>

      <form id="formLogin" class="login-form" autocomplete="off">
        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" maxlength="100" required>
          <small class="error-text" id="errorUsuario"></small>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" maxlength="100" required>
          <small class="error-text" id="errorPassword"></small>
        </div>

        <div class="form-group captcha-box">
          <label>Captcha</label>
          <div class="captcha-inline">
            <div class="captcha-preview" id="captchaPreview">A7K9</div>
            <button type="button" class="btn btn-secondary" id="btnRefreshCaptcha">↻</button>
          </div>
          <input type="text" id="captcha" name="captcha" maxlength="10" required placeholder="Escribe el captcha">
          <small class="error-text" id="errorCaptcha"></small>
        </div>

        <div class="login-actions">
          <button type="submit" class="btn btn-success btn-large">Ingresar</button>
        </div>

        <div class="alert alert-danger hidden" id="loginError"></div>
      </form>
    </div>
  </div>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/login.js"></script>
</body>
</html>
