<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Permisos Perfil</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/css/forms.css">
  <link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body>
  <div class="layout">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-badge">PC</div>
          <div>
            <div>Sistema Corporativo</div>
            <small>Seguridad / Permisos Perfil</small>
          </div>
        </div>
        <div class="topbar-actions">
          <span id="topbarUser">Usuario</span>
          <button class="btn btn-danger" id="btnLogout" type="button">Salir</button>
        </div>
      </div>
    </header>

    <div class="green-line"></div>

    <main class="main-shell">
      <aside class="sidebar">
        <div class="menu-title">Menú principal</div>
        <div id="sidebarMenu"></div>
      </aside>

      <section class="content">
        <nav class="breadcrumb">
          <a href="/dashboard">Inicio</a>
          <span>/</span>
          <span>Seguridad</span>
          <span>/</span>
          <span class="current">Permisos Perfil</span>
        </nav>

        <div class="card">
          <h1 class="page-title">Permisos Perfil</h1>
          <p class="page-subtitle">Asigna permisos por perfil usando una tabla tipo matriz.</p>
        </div>

        <div class="card">
          <div class="form-grid">
            <div class="form-group form-group-full">
              <label for="perfilSelector">Perfil</label>
              <div style="display:flex; gap:12px; flex-wrap:wrap;">
                <select id="perfilSelector" style="flex:1;">
                  <option value="">Seleccione</option>
                </select>
                <button type="button" class="btn btn-success" id="btnBuscarPermisos">Buscar</button>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="table-responsive">
            <table class="table permisos-matriz">
              <thead>
                <tr>
                  <th>Módulo</th>
                  <th>Agregar</th>
                  <th>Editar</th>
                  <th>Eliminar</th>
                  <th>Consultar</th>
                  <th>Detalle</th>
                </tr>
              </thead>
              <tbody id="tablaPermisosMatriz">
                <tr>
                  <td colspan="6" class="table-empty">Selecciona un perfil</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="form-actions" style="margin-top:20px;">
            <button type="button" class="btn btn-success" id="btnGuardarPermisosMatriz">Guardar</button>
            <a href="/dashboard" class="btn btn-secondary">Cancelar</a>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/menu.js"></script>
  <script src="/static/js/permisos_perfil_matriz.js"></script>
</body>
</html>
