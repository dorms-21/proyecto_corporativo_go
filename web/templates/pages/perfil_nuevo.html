<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Perfil</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/css/forms.css">
  <link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body>
  <div class="layout">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-badge">PC</div>
          <div>
            <div>Sistema Corporativo</div>
            <small>Seguridad / Perfil / Nuevo</small>
          </div>
        </div>
        <div class="topbar-actions">
          <span id="topbarUser">Usuario</span>
          <button class="btn btn-danger" id="btnLogout" type="button">Salir</button>
        </div>
      </div>
    </header>

    <div class="green-line"></div>

    <main class="main-shell">
      <aside class="sidebar">
        <div class="menu-title">Menú principal</div>
        <div id="sidebarMenu"></div>
      </aside>

      <section class="content">
        <nav class="breadcrumb">
          <a href="/dashboard">Inicio</a>
          <span>/</span>
          <a href="/seguridad/perfil">Perfil</a>
          <span>/</span>
          <span class="current">Nuevo</span>
        </nav>

        <div class="card">
          <h1 class="page-title">Nuevo Perfil</h1>
          <p class="page-subtitle">Registra un nuevo perfil en el sistema.</p>
        </div>

        <div class="card">
          <form id="formPerfilNuevo" class="form-grid">
            <div class="form-group">
              <label for="strNombrePerfil">Nombre del perfil</label>
              <input type="text" id="strNombrePerfil" maxlength="100" required>
              <small class="error-text" id="errorNombrePerfil"></small>
            </div>

            <div class="form-group checkbox-group">
              <label>
                <input type="checkbox" id="bitAdministrador">
                Es administrador
              </label>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-success">Guardar</button>
              <a href="/seguridad/perfil" class="btn btn-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/menu.js"></script>
  <script src="/static/js/perfil_nuevo.js"></script>
</body>
</html>
