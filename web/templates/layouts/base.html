<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <link rel="stylesheet" href="/static/css/forms.css">
  <link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body>
  <div class="layout">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-badge">PC</div>
          <div>
            <div>Sistema Corporativo</div>
            <small>Desarrollo Web Profesional</small>
          </div>
        </div>

        <div class="topbar-actions">
          <span id="topbarUser">Invitado</span>
          <button class="btn btn-danger" id="btnLogout" type="button">Salir</button>
        </div>
      </div>
    </header>

    <div class="green-line"></div>

    <main class="main-shell">
      <aside class="sidebar">
        <div id="sidebarMenu"></div>
      </aside>

      <section class="content">
        {{.Content}}
      </section>
    </main>
  </div>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/menu.js"></script>
  <script src="/static/js/breadcrumbs.js"></script>
</body>
</html>
